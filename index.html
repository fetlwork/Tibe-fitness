<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tebe Fitness - ጥቤ ፊትነስ</title>
    <style>
        :root { --primary: #e8491d; --secondary: #2c3e50; --light: #f9f9f9; --dark: #1a1a1a; }
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 0; background: var(--light); color: #333; line-height: 1.6; }
        header { background: var(--dark); color: white; padding: 40px 20px; text-align: center; border-bottom: var(--primary) 5px solid; }
        .container { width: 95%; max-width: 1100px; margin: auto; padding: 20px 0; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 30px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        button { background: var(--primary); color: white; border: none; padding: 15px 30px; cursor: pointer; border-radius: 8px; font-weight: bold; width: 100%; margin-top: 20px; }
        .result-box { margin-top: 20px; padding: 20px; background: #f0f7ff; border-radius: 8px; border-left: 5px solid var(--primary); }
        footer { background: var(--dark); color: white; text-align: center; padding: 40px 20px; margin-top: 60px; }
    </style>
</head>
<body>
<header>
    <h1>TEBE FITNESS | ጥቤ ፊትነስ</h1>
    <p>ሳይንሳዊ የስፖርት ሳይንስ እና የኒውትሬሽን ማዕከል</p>
</header>
<div class="container">
    <section class="card">
        <h2>🏋️ የግል ስልጠና መመሪያ</h2>
        <div class="grid">
            <div><label>ጾታ</label><select id="userGender"><option value="male">ወንድ</option><option value="female">ሴት</option></select></div>
            <div><label>ትኩረት የሚፈልገው ክፍል</label><select id="bodyPart"><option value="abs">ለሆድ (Abs)</option><option value="glutes">ለዳሌ</option></select></div>
        </div>
        <button onclick="getAdvice()">ምክር ያግኙ</button>
        <div id="result" class="result-box" style="display:none;"></div>
    </section>
</div>
<footer>
    <p>ጥቤ ፊትነስ - ወሰን ትራፊክ መብራት | 📞 0924399582</p>
</footer>
<script>
    function getAdvice() {
        document.getElementById('result').style.display = "block";
        document.getElementById('result').innerHTML = "እንኳን ወደ ጥቤ ፊትነስ በሰላም መጡ! ለጤናዎ የሚስማማ እንቅስቃሴ እና የአመጋገብ መመሪያ እናዘጋጅልዎታለን።";
    }
</script>
</body>
</html>
